<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DeathStar</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <!-- Top bar -->
  <header id="top-bar">
    <div class="top-bar-left">
      <button id="menu-btn" class="icon-btn" aria-label="Menu">&#9776;</button>
      <span class="logo">DeathStar</span>
    </div>
    <div class="top-bar-center">
      <button id="repo-btn" class="pill-btn repo-pill">
        <span id="repo-label">Select repo</span>
        <span class="caret">&#9662;</span>
      </button>
    </div>
    <div class="top-bar-right">
      <button id="settings-btn" class="icon-btn" aria-label="Settings">&#9881;</button>
    </div>
  </header>

  <!-- Repo picker overlay -->
  <div id="repo-picker" class="overlay hidden">
    <div class="overlay-header">
      <h2>Repositories</h2>
      <button class="icon-btn close-overlay" aria-label="Close">&times;</button>
    </div>
    <div id="repo-list" class="repo-list"></div>
  </div>

  <!-- Conversations sidebar -->
  <div id="sidebar" class="sidebar hidden">
    <div class="sidebar-header">
      <h2>Conversations</h2>
      <button id="new-chat-btn" class="pill-btn">+ New</button>
    </div>
    <div id="conversation-list" class="conversation-list"></div>
  </div>
  <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>

  <!-- Settings overlay -->
  <div id="settings-panel" class="overlay hidden">
    <div class="overlay-header">
      <h2>Settings</h2>
      <button class="icon-btn close-overlay" aria-label="Close">&times;</button>
    </div>
    <div class="settings-form">
      <label for="api-token-input">API Token</label>
      <input id="api-token-input" type="password" placeholder="Bearer token" autocomplete="off">
      <label for="provider-select">Provider</label>
      <select id="provider-select"></select>
      <label for="model-input">Model override</label>
      <input id="model-input" type="text" placeholder="(use default)">
      <button id="save-settings-btn" class="pill-btn primary">Save</button>
    </div>
  </div>

  <!-- Main chat view -->
  <main id="chat-view">
    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">&#9733;</div>
      <p>Select a repo to get started</p>
    </div>

    <!-- Messages -->
    <div id="messages" class="messages hidden"></div>

    <!-- Loading indicator -->
    <div id="loading" class="loading hidden">
      <span class="dots"><span>.</span><span>.</span><span>.</span></span>
      <span id="elapsed" class="elapsed"></span>
    </div>
  </main>

  <!-- Bottom input bar -->
  <footer id="input-bar" class="hidden">
    <div class="workflow-pills">
      <button class="workflow-pill active" data-workflow="prompt">Chat</button>
      <button class="workflow-pill" data-workflow="patch">Patch</button>
      <button class="workflow-pill" data-workflow="review">Review</button>
    </div>
    <div id="write-changes-row" class="write-changes-row hidden">
      <label><input type="checkbox" id="write-changes-toggle"> Apply changes to workspace</label>
    </div>
    <div class="input-row">
      <textarea id="message-input" rows="1" placeholder="Message DeathStar..."></textarea>
      <button id="send-btn" class="send-btn" disabled aria-label="Send">&#10148;</button>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js" crossorigin="anonymous"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
