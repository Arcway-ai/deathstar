<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#4b5563"/>
      <stop offset="40%" stop-color="#2a3444"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <radialGradient id="laser" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="60%" stop-color="#4a9eff80"/>
      <stop offset="100%" stop-color="#4a9eff00"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9eff40"/>
      <stop offset="100%" stop-color="#4a9eff00"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="32" cy="32" r="29"/>
    </clipPath>
  </defs>

  <!-- Outer glow -->
  <circle cx="32" cy="32" r="31" fill="url(#glow)" opacity="0.5"/>

  <!-- Main sphere -->
  <circle cx="32" cy="32" r="29" fill="url(#sphere)"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#3d4f65" stroke-width="1"/>

  <!-- Surface details (clipped to sphere) -->
  <g clip-path="url(#clip)" opacity="0.5">
    <!-- Latitude lines -->
    <ellipse cx="32" cy="18" rx="28" ry="3" fill="none" stroke="#1e2736" stroke-width="0.7"/>
    <ellipse cx="32" cy="46" rx="28" ry="3" fill="none" stroke="#1e2736" stroke-width="0.7"/>
    <!-- Longitude lines -->
    <ellipse cx="32" cy="32" rx="8" ry="28" fill="none" stroke="#1e2736" stroke-width="0.5"/>
    <ellipse cx="32" cy="32" rx="18" ry="28" fill="none" stroke="#1e2736" stroke-width="0.5"/>
    <!-- Panel lines (northern hemisphere) -->
    <line x1="10" y1="14" x2="22" y2="30" stroke="#1e2736" stroke-width="0.5"/>
    <line x1="42" y1="10" x2="48" y2="30" stroke="#1e2736" stroke-width="0.5"/>
    <line x1="54" y1="16" x2="56" y2="30" stroke="#1e2736" stroke-width="0.5"/>
    <!-- Panel lines (southern hemisphere) -->
    <line x1="12" y1="50" x2="18" y2="38" stroke="#1e2736" stroke-width="0.4"/>
    <line x1="38" y1="38" x2="44" y2="54" stroke="#1e2736" stroke-width="0.4"/>
    <line x1="52" y1="38" x2="54" y2="48" stroke="#1e2736" stroke-width="0.4"/>
  </g>

  <!-- Equatorial trench -->
  <ellipse cx="32" cy="33" rx="29" ry="4.5" fill="none" stroke="#0a0e14" stroke-width="2.5" clip-path="url(#clip)"/>
  <ellipse cx="32" cy="33" rx="29" ry="4.5" fill="none" stroke="#1e2736" stroke-width="0.8" clip-path="url(#clip)"/>
  <!-- Trench detail dashes -->
  <g clip-path="url(#clip)" opacity="0.4">
    <line x1="8" y1="33" x2="12" y2="33" stroke="#3d4f65" stroke-width="0.6"/>
    <line x1="16" y1="32" x2="20" y2="32" stroke="#3d4f65" stroke-width="0.6"/>
    <line x1="24" y1="31.5" x2="28" y2="31.5" stroke="#3d4f65" stroke-width="0.6"/>
    <line x1="36" y1="31.5" x2="40" y2="31.5" stroke="#3d4f65" stroke-width="0.6"/>
    <line x1="44" y1="32" x2="48" y2="32" stroke="#3d4f65" stroke-width="0.6"/>
    <line x1="52" y1="33" x2="56" y2="33" stroke="#3d4f65" stroke-width="0.6"/>
  </g>

  <!-- Superlaser dish (concave) -->
  <circle cx="21" cy="19" r="9" fill="#0a0e14" opacity="0.6" clip-path="url(#clip)"/>
  <circle cx="21" cy="19" r="9" fill="none" stroke="#2a3444" stroke-width="1"/>
  <circle cx="21" cy="19" r="6" fill="none" stroke="#1e2736" stroke-width="0.6"/>
  <circle cx="21" cy="19" r="3" fill="none" stroke="#1e2736" stroke-width="0.5"/>
  <!-- Laser emitter -->
  <circle cx="21" cy="19" r="5" fill="url(#laser)" opacity="0.7"/>
  <circle cx="21" cy="19" r="2.5" fill="#4a9eff" opacity="0.9"/>
  <circle cx="21" cy="19" r="1" fill="#ffffff" opacity="0.8"/>

  <!-- Specular highlight -->
  <ellipse cx="40" cy="16" rx="8" ry="5" fill="white" opacity="0.06" transform="rotate(-15 40 16)"/>
</svg>
