name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build frontend
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build

      # Build Python package
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Generate release notes
        id: notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          TAG=${GITHUB_REF_NAME}

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
            # First release — use all commits
            COMMITS=$(git log --oneline --no-decorate HEAD)
          else
            COMMITS=$(git log --oneline --no-decorate "${PREV_TAG}..${TAG}")
          fi

          # Write release notes to a file
          cat > release_notes.md << 'NOTES_EOF'
          ## What's Changed

          NOTES_EOF

          echo "$COMMITS" | while IFS= read -r line; do
            echo "- ${line}" >> release_notes.md
          done

          cat >> release_notes.md << 'NOTES_EOF'

          ## Installation

          ```bash
          # With uv (recommended)
          uv tool install deathstar-ai

          # With pipx
          pipx install deathstar-ai

          # With pip
          pip install deathstar-ai

          # From source
          git clone https://github.com/Arcway-ai/deathstar.git
          cd deathstar
          uv tool install -e . --force
          ```
          NOTES_EOF
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md \
            dist/*

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
