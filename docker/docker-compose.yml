services:
  control-api:
    build:
      context: /opt/deathstar/repo
      dockerfile: docker/control-api.Dockerfile
    container_name: deathstar-control-api
    restart: unless-stopped
    env_file:
      - /opt/deathstar/runtime.env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /workspace:/workspace
      - /workspace/deathstar/logs:/var/log/deathstar
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8080/v1/health', timeout=3).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
