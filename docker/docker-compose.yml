services:
  postgres:
    image: postgres:17-alpine
    container_name: deathstar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deathstar
      POSTGRES_USER: deathstar
      POSTGRES_PASSWORD: ${DEATHSTAR_DB_PASSWORD:-deathstar}
    volumes:
      - /workspace/deathstar/pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deathstar -d deathstar"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  control-api:
    image: deathstar-app:latest
    container_name: deathstar-control-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - /opt/deathstar/runtime.env
    environment:
      - CLAUDE_PLUGIN_DIR=/opt/claude-plugins
      - DEATHSTAR_DATABASE_URL=postgresql://deathstar:${DEATHSTAR_DB_PASSWORD:-deathstar}@postgres:5432/deathstar
    ports:
      - "8080:8080"
    volumes:
      - /workspace:/workspace
      - /workspace/deathstar/logs:/var/log/deathstar
      - /workspace/deathstar/.claude:/root/.claude
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8080/v1/health', timeout=3).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
